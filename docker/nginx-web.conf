# Single-page app + /api reverse proxy. Tolerates Cloudflare Tunnel (and local) Host headers.
server {
    listen 80 default_server;
    server_name ohvoter.patrickfweston.com localhost 127.0.0.1;

    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/css application/javascript application/json;

    # Dynamic resolve + IPv4-only: avoids 502 when `api` resolves to IPv6 first and Node listens on IPv4 only.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream http://api:3092;

    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
