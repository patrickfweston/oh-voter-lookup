services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voter
      POSTGRES_PASSWORD: voter
      POSTGRES_DB: voter_guide
    ports:
      - '5492:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voter -d voter_guide']
      interval: 3s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://voter:voter@db:5432/voter_guide
      HOST: 0.0.0.0
      PORT: '3092'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3092/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Publishes http://127.0.0.1:8092 → SPA + nginx proxy to api. Point Cloudflare Tunnel
  # (ohvoter.patrickfweston.com) at that URL; nginx accepts that Host name (see docker/nginx-web.conf).
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - '8092:80'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
