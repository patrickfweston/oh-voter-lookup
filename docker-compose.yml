services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voter
      POSTGRES_PASSWORD: voter
      POSTGRES_DB: voter_guide
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voter -d voter_guide']
      interval: 3s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://voter:voter@db:5432/voter_guide
      HOST: 0.0.0.0
      PORT: '3001'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - '8092:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
